name: Sync Experiments

on:
  workflow_dispatch:
    inputs:
      experiment_log_level:
        description: 'Experiment log level (debug, info, warn)'
        required: false
        default: 'info'
  push:
    branches: [main]
    paths:
      - 'App/UI/**'
      - 'App/Logic/**'
      - 'Sources/**'
      - 'Tests/**'
      - 'tools/test-peer-bot/**'
  pull_request:
    branches: [main]
    paths:
      - 'App/UI/**'
      - 'App/Logic/**'
      - 'Sources/**'
      - 'Tests/**'
      - 'tools/test-peer-bot/**'

jobs:
  docker-room:
    name: Start Docker Room
    runs-on: ubuntu-latest
    outputs:
      room_port: ${{ steps.start-room.outputs.port }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Docker Compose room
        id: start-room
        run: |
          cd ssb-room-data
          docker compose up -d
          sleep 5
          PORT=$(docker compose port server mux 2>/dev/null | cut -d: -f2 || echo "8008")
          echo "port=$PORT" >> $GITHUB_OUTPUT
          docker compose ps

      - name: Check room health
        run: |
          sleep 2
          curl -s http://localhost:8008 || echo "Room HTTP not available (ok for mux-only)"

  build-test-peer-bot:
    name: Build Test Peer Bot
    runs-on: ubuntu-latest
    needs: docker-room
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build test peer bot
        run: |
          cd tools/test-peer-bot
          go build -o test-peer-bot .

      - name: Upload bot binary
        uses: actions/upload-artifact@v4
        with:
          name: test-peer-bot
          path: tools/test-peer-bot/test-peer-bot

  sync-experiments:
    name: Run Sync Experiments
    runs-on: macos-latest
    needs: [docker-room, build-test-peer-bot]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Download test peer bot
        uses: actions/download-artifact@v4
        with:
          name: test-peer-bot
          path: tools/test-peer-bot/

      - name: Make bot executable
        run: chmod +x tools/test-peer-bot/test-peer-bot

      - name: Start Docker room on macOS
        run: |
          cd ssb-room-data
          docker compose up -d
          sleep 5
          docker compose ps

      - name: Run XCTest Sync Experiments
        run: |
          xcodebuild test \
            -scheme "ScuttleRoomApp" \
            -target "SRSyncExperimentTests" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee experiment_output.log

      - name: Upload experiment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-logs
          path: |
            /tmp/scuttle_exp_*.jsonl
            experiment_output.log
          retention-days: 7

      - name: Upload experiment results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-results
          path: experiment_output.log
          retention-days: 30
