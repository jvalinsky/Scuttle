name: SSBNetwork
options:
  bundleIdPrefix: com.scuttlebutt
targets:
  SSBNetwork:
    type: framework
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources
        excludes:
          - GNUstepDemo.m
          - HeadlessDemo.m
          - ScuttleCLI.m
          - git-remote-ssb.c
          - SSBGitRemoteCore.c
          - SSBGitRemoteCore.h
          - SSBKeychain_Linux.m
          - SSBKeychain_macOS.m
      - path: App/Logic/SRNotificationNames.m
        group: App/Logic
    dependencies:
      - sdk: libsqlite3.tbd
      - sdk: Security.framework
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      INFOPLIST_FILE: Sources/Info.plist
  SSBNetworkTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests
        excludes:
          - Fixtures
          - GitRemoteSSB
          - ScuttleRoomApp
      - path: App/UI/SRContentContainerViewController.m
        group: App/UI
    dependencies:
      - target: SSBNetwork
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      HEADER_SEARCH_PATHS: $(inherited) $(SRCROOT)/App/UI
  ScuttleRoomAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    hostApplication: ScuttleRoomApp
    sources:
      - path: Tests/ScuttleRoomApp
    dependencies:
      - target: ScuttleRoomApp
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
  SSBGitRemoteCore:
    type: library.static
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/SSBGitRemoteCore.c
      - path: Sources/SSBGitRemoteCore.h
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
  GitRemoteSSBTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests/GitRemoteSSB
    dependencies:
      - target: SSBGitRemoteCore
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      HEADER_SEARCH_PATHS: $(inherited) $(SRCROOT)/Sources
  ScuttleRoomApp:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: App
    dependencies:
      - target: SSBNetwork
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      INFOPLIST_FILE: App/Info.plist
  git-remote-ssb:
    type: tool
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/git-remote-ssb.c
    dependencies:
      - target: SSBGitRemoteCore
    settings:
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
schemes:
  SSBNetwork:
    build:
      targets:
        SSBNetwork: all
    test:
      targets:
        - SSBNetworkTests
  ScuttleRoomApp:
    build:
      targets:
        ScuttleRoomApp: all
    test:
      targets:
        - ScuttleRoomAppTests
  git-remote-ssb:
    build:
      targets:
        git-remote-ssb: all
    test:
      targets:
        - GitRemoteSSBTests
