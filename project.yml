name: SSBNetwork
options:
  bundleIdPrefix: com.scuttlebutt
targets:
  SSBNetwork:
    type: framework
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources
        excludes:
          - GNUstepDemo.m
          - HeadlessDemo.m
          - ScuttleCLI.m
          - git-remote-ssb.c
          - SSBKeychain_Linux.m
          - SSBKeychain_macOS.m
      - path: App/Logic/SRNotificationNames.m
        group: App/Logic
    dependencies:
      - sdk: libsqlite3.tbd
      - sdk: Security.framework
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      INFOPLIST_FILE: Sources/Info.plist
  SSBNetworkTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests
      - path: App/UI/SRContentContainerViewController.m
        group: App/UI
    dependencies:
      - target: SSBNetwork
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      HEADER_SEARCH_PATHS: $(inherited) $(SRCROOT)/App/UI
  ScuttleRoomApp:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: App
    dependencies:
      - target: SSBNetwork
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      INFOPLIST_FILE: App/Info.plist
  git-remote-ssb:
    type: tool
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/git-remote-ssb.c
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
schemes:
  SSBNetwork:
    build:
      targets:
        SSBNetwork: all
    test:
      targets:
        - SSBNetworkTests
