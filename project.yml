name: SSBNetwork
options:
  bundleIdPrefix: com.scuttlebutt
targets:
  SSBNetwork:
    type: framework
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources
    dependencies:
      - sdk: libsqlite3.tbd
      - sdk: Security.framework
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      INFOPLIST_FILE: Sources/Info.plist
  SSBNetworkTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests
    dependencies:
      - target: SSBNetwork
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
  ScuttleRoomApp:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: App
    dependencies:
      - target: SSBNetwork
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      INFOPLIST_FILE: App/Info.plist
schemes:
  SSBNetwork:
    build:
      targets:
        SSBNetwork: all
    test:
      targets:
        - SSBNetworkTests
